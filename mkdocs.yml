site_name: nTIS Research Notebook
site_url: https://KChaeYeon.github.io/nTIS_note
repo_url: https://github.com/KChaeYeon/nTIS_note
repo_name: KChaeYeon/nTIS_note

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.sections
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - awesome-pages

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - attr_list
  - md_in_html

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

# nav는 awesome-pages 플러그인이 폴더 구조 + 각 폴더의 .pages 파일로 자동 생성한다.
# 새 논문/회의록/이론 문서를 추가하면 별도 설정 없이 자동으로 목차에 반영된다.
# 최상위 순서/노출은 docs/.pages 에서 제어한다.
